services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        user: 'www-data'
        uid: '1000'
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - yii2-network
    environment:
      - COMPOSER_HOME=/var/cache/composer
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - yii2-network
    depends_on:
      - php

  postgres:
    image: postgres:15.2
    restart: unless-stopped
    environment:
      POSTGRES_DB: 'loans'
      POSTGRES_USER: 'user'
      POSTGRES_PASSWORD: 'password'
    ports:
      - '5432:5432'
    volumes:
      - postgresdata:/var/lib/postgresql/data
      - ./docker/postgres/:/docker-entrypoint-initdb.d/
    networks:
      - yii2-network

networks:
  yii2-network:
    driver: bridge

volumes:
  postgresdata:
    driver: local
